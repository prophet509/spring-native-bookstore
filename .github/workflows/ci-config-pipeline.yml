name: Config CI Pipeline
on:
  workflow_call:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: config-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Compile and test application
        run: |
          chmod +x gradlew
          ./gradlew build

  package:
    name: Package
    needs: [build]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: config-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Debug registry inputs
        run: |
          echo "REGISTRY_URL=${{ secrets.REGISTRY_URL }}"
          echo "REGISTRY_USERNAME=${{ secrets.REGISTRY_USERNAME }}"
          if [ -z "${{ secrets.REGISTRY_URL }}" ]; then
            echo "REGISTRY_URL is empty" && exit 1
          fi
          if [ -z "${{ secrets.REGISTRY_USERNAME }}" ]; then
            echo "REGISTRY_USERNAME is empty" && exit 1
          fi
          if [ -z "${{ secrets.REGISTRY_TOKEN }}" ]; then
            echo "REGISTRY_TOKEN is empty" && exit 1
          fi
          echo "All registry secrets are present"

      - name: Containerize and publish image
        run: |
          chmod +x gradlew
          ./gradlew bootBuildImage --publishImage \
            -PregistryUrl=${{ secrets.REGISTRY_URL }} \
            -PregistryUsername=${{ secrets.REGISTRY_USERNAME }} \
            -PregistryToken=${{ secrets.REGISTRY_TOKEN }}
